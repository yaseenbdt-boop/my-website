
<!DOCTYPE html>
<html>
<head>
    <title>Yaseen | Web Designer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #000000, #1f1f1f);
            color: white;
        }

        /* NAVBAR */
        nav {
            background: #111;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        nav a {
            color: cyan;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* HEADER */
        header {
            padding: 40px;
            text-align: center;
        }

        header h1 {
            color: cyan;
            font-size: 40px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px cyan; }
            to { text-shadow: 0 0 20px cyan, 0 0 30px cyan; }
        }

        header p {
            color: lightgray;
        }

        img {
            width: 120px;
            border-radius: 50%;
            border: 3px solid cyan;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: cyan;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
        }

        .section {
            padding: 30px;
            text-align: center;
        }

        .box {
            background: #111;
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px cyan;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: gray;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <a href="#">Home</a>

<div class="section">

</div>

<!-- WHY -->

 <!DOCTYPE html><!DOCTYPE od i<!DOCTYPE html>
<html>
<head>
    <title>My Cool Website</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #000000, #1a1a1a);
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: cyan;
            animation: move 2s infinite alternate;
        }

        @keyframes move {
            from { transform: translateY(0px); }
            to { transform: translateY(20px); }
        }

        img {
            width: 150px;
            border-radius: 50%;
            margin-top: 20px;
            border: 3px solid cyan;
        }

        button {
            padding: 12px 25px;
            background: cyan;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }

        button:hover {
            background: white;
        }
    </style>
</head>

<body>

    <img src="https://i.imgur.com/6VBx3io.png" alt="profile">

    <h1>🚀 Welcome to my website</h1>

    <p>This site is made by Yaseen 😎</p>

    <button onclick="alert('Welcome to my site! 😄')">
        Click Me
    </button>

</body>
</html>
